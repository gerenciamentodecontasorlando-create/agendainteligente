<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Pessoal Pro - Tech Edition</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a8e6cf;
            --dark: #2d3436;
            --light: #f8f9fa;
            --danger: #e74c3c;
            --success: #00b894;
            --warning: #fdcb6e;
            --glass: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #a8e6cf, #ffd3b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1.2em;
            color: #a8e6cf;
            opacity: 0.9;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-tab {
            padding: 15px 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-tab:hover, .nav-tab.active {
            background: var(--gradient);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
        }

        /* Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #a8e6cf;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #a8e6cf;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #a8e6cf;
            box-shadow: 0 0 10px rgba(168, 230, 207, 0.3);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: #2d3436;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Items List */
        .item-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #a8e6cf;
            transition: all 0.3s ease;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .item .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item .item-title {
            font-weight: 600;
            color: #a8e6cf;
        }

        .item .item-date {
            font-size: 0.9em;
            color: #fdcb6e;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-success {
            background: #00b894;
            color: white;
        }

        .badge-warning {
            background: #fdcb6e;
            color: #2d3436;
        }

        .badge-danger {
            background: #e74c3c;
            color: white;
        }

        .badge-info {
            background: #74b9ff;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #2d3436, #636e72);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Receipt */
        .receipt {
            background: white;
            color: #2d3436;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .receipt h3 {
            text-align: center;
            color: #6c5ce7;
            margin-bottom: 20px;
            border-bottom: 2px dashed #6c5ce7;
            padding-bottom: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .nav-tab {
                padding: 10px 20px;
                font-size: 0.9em;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>✨ Agenda Pro Tech</h1>
            <div class="date-display" id="currentDate"></div>
        </div>

        <!-- Navigation -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('calendar')">📅 Calendário</button>
            <button class="nav-tab" onclick="showTab('bills')">💰 Contas</button>
            <button class="nav-tab" onclick="showTab('projects')">🚀 Projetos</button>
            <button class="nav-tab" onclick="showTab('export')">📥 Exportar</button>
        </div>

        <!-- Calendar Tab -->
        <div id="calendar-tab" class="tab-content">
            <div class="card">
                <h2>📅 Compromissos do Dia</h2>
                <div class="form-group">
                    <label>Novo Compromisso</label>
                    <input type="text" id="eventTitle" placeholder="Título do compromisso">
                </div>
                <div class="grid">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="eventDate">
                    </div>
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="time" id="eventTime">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="eventType">
                        <option value="meeting">Reunião</option>
                        <option value="personal">Pessoal</option>
                        <option value="health">Saúde</option>
                        <option value="other">Outro</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addEvent()">Adicionar Compromisso</button>
                <div class="item-list" id="eventsList" style="margin-top: 20px;"></div>
            </div>
        </div>

        <!-- Bills Tab -->
        <div id="bills-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h2>💰 Gestão de Contas</h2>
                <div class="form-group">
                    <label>Descrição da Conta</label>
                    <input type="text" id="billDescription" placeholder="Ex: Aluguel, Internet, etc.">
                </div>
                <div class="grid">
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="billAmount" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Data de Vencimento</label>
                        <input type="date" id="billDueDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="billRecurring" style="width: auto; margin-right: 10px;">
                        Conta Recorrente
                    </label>
                </div>
                <div id="recurringOptions" style="display:none;">
                    <div class="form-group">
                        <label>Frequência</label>
                        <select id="recurringFrequency">
                            <option value="monthly">Mensal</option>
                            <option value="weekly">Semanal</option>
                            <option value="yearly">Anual</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="billStatus">
                        <option value="pending">Pendente</option>
                        <option value="paid">Pago</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addBill()">Adicionar Conta</button>
                <button class="btn btn-warning" onclick="generateReceipt()">Gerar Recibo</button>
                <div class="item-list" id="billsList" style="margin-top: 20px;"></div>
                
                <!-- Receipt Modal -->
                <div id="receiptModal" class="modal">
                    <div class="modal-content">
                        <h2>🧾 Recibo Gerado</h2>
                        <div class="receipt" id="receiptContent"></div>
                        <button class="btn btn-primary" onclick="printReceipt()">🖨️ Imprimir</button>
                        <button class="btn btn-danger" onclick="closeModal('receiptModal')">Fechar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Projects Tab -->
        <div id="projects-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h2>🚀 Gestão de Projetos</h2>
                <div class="form-group">
                    <label>Nome do Projeto</label>
                    <input type="text" id="projectName" placeholder="Nome do projeto">
                </div>
                <div class="form-group">
                    <label>Descrição Detalhada</label>
                    <textarea id="projectDescription" rows="4" placeholder="Descreva seu projeto em detalhes..."></textarea>
                </div>
                <div class="grid">
                    <div class="form-group">
                        <label>Data de Início</label>
                        <input type="date" id="projectStart">
                    </div>
                    <div class="form-group">
                        <label>Prazo Final</label>
                        <input type="date" id="projectEnd">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="projectStatus">
                        <option value="planning">Planejamento</option>
                        <option value="in_progress">Em Andamento</option>
                        <option value="completed">Concluído</option>
                        <option value="on_hold">Pausado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Prioridade</label>
                    <select id="projectPriority">
                        <option value="low">Baixa</option>
                        <option value="medium">Média</option>
                        <option value="high">Alta</option>
                        <option value="urgent">Urgente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tarefas (separadas por vírgula)</label>
                    <input type="text" id="projectTasks" placeholder="Tarefa 1, Tarefa 2, Tarefa 3">
                </div>
                <button class="btn btn-primary" onclick="addProject()">Adicionar Projeto</button>
                <div class="item-list" id="projectsList" style="margin-top: 20px;"></div>
            </div>
        </div>

        <!-- Export Tab -->
        <div id="export-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h2>📥 Exportar Dados</h2>
                <p>Exporte sua agenda completa nos formatos abaixo:</p>
                <div style="margin-top: 20px;">
                    <button class="btn btn-success" onclick="exportToWord()">📄 Exportar para Word</button>
                    <button class="btn btn-primary" onclick="exportToPDF()">📕 Exportar para PDF</button>
                    <button class="btn btn-warning" onclick="backupData()">💾 Backup de Dados</button>
                    <button class="btn btn-danger" onclick="restoreData()">📂 Restaurar Backup</button>
                    <input type="file" id="backupFile" style="display:none;" onchange="loadBackup(event)">
                </div>
                <div style="margin-top: 30px;">
                    <h3>Prévia dos Dados</h3>
                    <pre id="dataPreview" style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; overflow-x: auto; max-height: 300px;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        // Data Management
        let appData = {
            events: [],
            bills: [],
            projects: []
        };

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('agendaProData');
            if (saved) {
                appData = JSON.parse(saved);
            }
        }

        function saveData() {
            localStorage.setItem('agendaProData', JSON.stringify(appData));
            updateAllDisplays();
        }

        // Initialize
        loadData();
        updateCurrentDate();
        updateAllDisplays();

        function updateCurrentDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('pt-BR', options);
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(tabName + '-tab').style.display = 'block';
            event.target.classList.add('active');
            updateAllDisplays();
        }

        // Events Management
        function addEvent() {
            const title = document.getElementById('eventTitle').value;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const type = document.getElementById('eventType').value;

            if (!title || !date) {
                alert('Preencha o título e data do compromisso!');
                return;
            }

            appData.events.push({
                id: Date.now(),
                title,
                date,
                time,
                type,
                created: new Date().toISOString()
            });

            saveData();
            clearEventForm();
        }

        function deleteEvent(id) {
            appData.events = appData.events.filter(e => e.id !== id);
            saveData();
        }

        function clearEventForm() {
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('eventTime').value = '';
        }

        // Bills Management
        function addBill() {
            const description = document.getElementById('billDescription').value;
            const amount = document.getElementById('billAmount').value;
            const dueDate = document.getElementById('billDueDate').value;
            const recurring = document.getElementById('billRecurring').checked;
            const frequency = document.getElementById('recurringFrequency').value;
            const status = document.getElementById('billStatus').value;

            if (!description || !amount || !dueDate) {
                alert('Preencha todos os campos da conta!');
                return;
            }

            appData.bills.push({
                id: Date.now(),
                description,
                amount: parseFloat(amount),
                dueDate,
                recurring,
                frequency: recurring ? frequency : null,
                status,
                created: new Date().toISOString()
            });

            saveData();
            clearBillForm();
        }

        function deleteBill(id) {
            appData.bills = appData.bills.filter(b => b.id !== id);
            saveData();
        }

        function clearBillForm() {
            document.getElementById('billDescription').value = '';
            document.getElementById('billAmount').value = '';
            document.getElementById('billDueDate').value = '';
            document.getElementById('billRecurring').checked = false;
            document.getElementById('billStatus').value = 'pending';
        }

        function generateReceipt() {
            if (appData.bills.length === 0) {
                alert('Adicione contas primeiro!');
                return;
            }

            const lastBill = appData.bills[appData.bills.length - 1];
            const receiptHTML = `
                <div style="text-align: center;">
                    <h3>RECIBO DE PAGAMENTO</h3>
                    <p><strong>Nº ${lastBill.id}</strong></p>
                </div>
                <p><strong>Data:</strong> ${new Date().toLocaleDateString('pt-BR')}</p>
                <p><strong>Descrição:</strong> ${lastBill.description}</p>
                <p><strong>Valor:</strong> R$ ${lastBill.amount.toFixed(2)}</p>
                <p><strong>Vencimento:</strong> ${new Date(lastBill.dueDate).toLocaleDateString('pt-BR')}</p>
                <p><strong>Status:</strong> ${lastBill.status === 'paid' ? 'PAGO ✓' : 'PENDENTE'}</p>
                ${lastBill.recurring ? `<p><strong>Recorrente:</strong> Sim (${lastBill.frequency})</p>` : ''}
                <div style="margin-top: 30px; text-align: center;">
                    <p>_______________________________</p>
                    <p>Assinatura</p>
                </div>
            `;

            document.getElementById('receiptContent').innerHTML = receiptHTML;
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function printReceipt() {
            const receipt = document.getElementById('receiptContent').innerHTML;
            const printWindow = window.open('', '', 'width=600,height=600');
            printWindow.document.write('<html><head><title>Recibo</title></head><body>');
            printWindow.document.write(receipt);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Projects Management
        function addProject() {
            const name = document.getElementById('projectName').value;
            const description = document.getElementById('projectDescription').value;
            const start = document.getElementById('projectStart').value;
            const end = document.getElementById('projectEnd').value;
            const status = document.getElementById('projectStatus').value;
            const priority = document.getElementById('projectPriority').value;
            const tasks = document.getElementById('projectTasks').value.split(',').map(t => t.trim());

            if (!name) {
                alert('Nome do projeto é obrigatório!');
                return;
            }

            appData.projects.push({
                id: Date.now(),
                name,
                description,
                start,
                end,
                status,
                priority,
                tasks,
                created: new Date().toISOString()
            });

            saveData();
            clearProjectForm();
        }

        function deleteProject(id) {
            appData.projects = appData.projects.filter(p => p.id !== id);
            saveData();
        }

        function clearProjectForm() {
            document.getElementById('projectName').value = '';
            document.getElementById('projectDescription').value = '';
            document.getElementById('projectStart').value = '';
            document.getElementById('projectEnd').value = '';
            document.getElementById('projectTasks').value = '';
        }

        // Update Displays
        function updateAllDisplays() {
            updateEventsDisplay();
            updateBillsDisplay();
            updateProjectsDisplay();
            updateDataPreview();
        }

        function updateEventsDisplay() {
            const container = document.getElementById('eventsList');
            container.innerHTML = appData.events.map(event => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${event.title}</span>
                        <span class="badge badge-info">${event.type}</span>
                    </div>
                    <div class="item-date">
                        📅 ${new Date(event.date).toLocaleDateString('pt-BR')} ${event.time ? 'às ' + event.time : ''}
                    </div>
                    <div class="actions">
                        <button class="btn btn-danger" onclick="deleteEvent(${event.id})" style="padding: 5px 10px; font-size: 0.8em;">Excluir</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align: center; opacity: 0.7;">Nenhum compromisso adicionado</p>';
        }

        function updateBillsDisplay() {
            const container = document.getElementById('billsList');
            container.innerHTML = appData.bills.map(bill => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${bill.description}</span>
                        <span class="badge ${bill.status === 'paid' ? 'badge-success' : 'badge-warning'}">
                            ${bill.status === 'paid' ? 'Pago' : 'Pendente'}
                        </span>
                    </div>
                    <div>💰 R$ ${bill.amount.toFixed(2)}</div>
                    <div class="item-date">📅 Vence: ${new Date(bill.dueDate).toLocaleDateString('pt-BR')}</div>
                    ${bill.recurring ? `<div>🔄 Recorrente (${bill.frequency})</div>` : ''}
                    <div class="actions">
                        <button class="btn btn-success" onclick="markBillAsPaid(${bill.id})" style="padding: 5px 10px; font-size: 0.8em;">
                            ${bill.status === 'paid' ? 'Desmarcar' : 'Pagar'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteBill(${bill.id})" style="padding: 5px 10px; font-size: 0.8em;">Excluir</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align: center; opacity: 0.7;">Nenhuma conta adicionada</p>';
        }

        function markBillAsPaid(id) {
            const bill = appData.bills.find(b => b.id === id);
            if (bill) {
                bill.status = bill.status === 'paid' ? 'pending' : 'paid';
                saveData();
            }
        }

        function updateProjectsDisplay() {
            const container = document.getElementById('projectsList');
            container.innerHTML = appData.projects.map(project => `
                <div class="item">
                    <div class="item-header">
                        <span class="item-title">${project.name}</span>
                        <span class="badge badge-${getPriorityColor(project.priority)}">${project.priority}</span>
                    </div>
                    <p>${project.description || 'Sem descrição'}</p>
                    <div>📅 ${new Date(project.start).toLocaleDateString('pt-BR')} - ${new Date(project.end).toLocaleDateString('pt-BR')}</div>
                    <div>📋 Tarefas: ${project.tasks.join(', ') || 'Nenhuma'}</div>
                    <div>Status: ${getStatusText(project.status)}</div>
                    <div class="actions">
                        <button class="btn btn-danger" onclick="deleteProject(${project.id})" style="padding: 5px 10px; font-size: 0.8em;">Excluir</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align: center; opacity: 0.7;">Nenhum projeto adicionado</p>';
        }

        function getPriorityColor(priority) {
            const colors = {
                low: 'success',
                medium: 'warning',
                high: 'danger',
                urgent: 'danger'
            };
            return colors[priority] || 'info';
        }

        function getStatusText(status) {
            const texts = {
                planning: '📝 Planejamento',
                in_progress: '⚡ Em Andamento',
                completed: '✅ Concluído',
                on_hold: '⏸️ Pausado'
            };
            return texts[status] || status;
        }

        function updateDataPreview() {
            document.getElementById('dataPreview').textContent = JSON.stringify(appData, null, 2);
        }

        // Export Functions
        function exportToWord() {
            let content = `
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { font-family: Arial, sans-serif; }
                        h1 { color: #6c5ce7; }
                        h2 { color: #a8e6cf; }
                        .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
                    </style>
                </head>
                <body>
                    <h1>Agenda Pro Tech - Exportação</h1>
                    <p>Data: ${new Date().toLocaleDateString('pt-BR')}</p>
                    
                    <h2>📅 Compromissos</h2>
                    ${appData.events.map(e => `
                        <div class="section">
                            <p><strong>${e.title}</strong></p>
                            <p>Data: ${new Date(e.date).toLocaleDateString('pt-BR')} ${e.time || ''}</p>
                            <p>Tipo: ${e.type}</p>
                        </div>
                    `).join('')}
                    
                    <h2>💰 Contas</h2>
                    ${appData.bills.map(b => `
                        <div class="section">
                            <p><strong>${b.description}</strong></p>
                            <p>Valor: R$ ${b.amount.toFixed(2)}</p>
                            <p>Vencimento: ${new Date(b.dueDate).toLocaleDateString('pt-BR')}</p>
                            <p>Status: ${b.status}</p>
                        </div>
                    `).join('')}
                    
                    <h2>🚀 Projetos</h2>
                    ${appData.projects.map(p => `
                        <div class="section">
                            <p><strong>${p.name}</strong></p>
                            <p>${p.description}</p>
                            <p>Tarefas: ${p.tasks.join(', ')}</p>
                            <p>Status: ${p.status}</p>
                        </div>
                    `).join('')}
                </body>
                </html>
            `;

            const blob = new Blob([content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'agenda_pro_' + new Date().toISOString().split('T')[0] + '.doc';
            a.click();
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(20);
            doc.text('Agenda Pro Tech', 20, 20);
            doc.setFontSize(12);
            doc.text('Data: ' + new Date().toLocaleDateString('pt-BR'), 20, 30);
            
            let y = 50;
            
            // Events
            doc.setFontSize(16);
            doc.text('Compromissos', 20, y);
            y += 10;
            
            appData.events.forEach(e => {
                doc.setFontSize(12);
                doc.text(`${e.title} - ${new Date(e.date).toLocaleDateString('pt-BR')}`, 30, y);
                y += 10;
            });
            
            y += 10;
            
            // Bills
            doc.setFontSize(16);
            doc.text('Contas', 20, y);
            y += 10;
            
            appData.bills.forEach(b => {
                doc.setFontSize(12);
                doc.text(`${b.description} - R$ ${b.amount.toFixed(2)}`, 30, y);
                y += 10;
            });
            
            y += 10;
            
            // Projects
            doc.setFontSize(16);
            doc.text('Projetos', 20, y);
            y += 10;
            
            appData.projects.forEach(p => {
                doc.setFontSize(12);
                doc.text(`${p.name} - ${p.status}`, 30, y);
                y += 10;
            });
            
            doc.save('agenda_pro_' + new Date().toISOString().split('T')[0] + '.pdf');
        }

        function backupData() {
            const dataStr = JSON.stringify(appData);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_agenda_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
        }

        function restoreData() {
            document.getElementById('backupFile').click();
        }

        function loadBackup(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        appData = data;
                        saveData();
                        alert('Backup restaurado com sucesso!');
                    } catch (error) {
                        alert('Erro ao carregar backup. Arquivo inválido.');
                    }
                };
                reader.readAsText(file);
            }
        }

        // Toggle recurring options
        document.getElementById('billRecurring').addEventListener('change', function() {
            document.getElementById('recurringOptions').style.display = this.checked ? 'block' : 'none';
        });

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // Service Worker for PWA (Mobile Installation)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // Auto-save periodically
        setInterval(saveData, 30000);
    </script>
</body>
</html>
